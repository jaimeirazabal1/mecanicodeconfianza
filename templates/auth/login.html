{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••">
            </div>
            <div id="loginError" class="form-error hidden"></div>
            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
        <p class="auth-link">¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
    </div>
</div>
{% endblock %}
