{% extends "base.html" %}
{% block title %}Registrarse{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Nombre completo</label>
                <input type="text" id="name" class="form-input" required placeholder="Juan Pérez">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="phone">Teléfono</label>
                <input type="tel" id="phone" class="form-input" placeholder="+52 555 123 4567">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" required placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label for="role">Tipo de cuenta</label>
                <select id="role" class="form-input">
                    <option value="client">Cliente - Busco mecánico</option>
                    <option value="mechanic">Mecánico - Ofrezco servicios</option>
                </select>
            </div>
            <div id="registerError" class="form-error hidden"></div>
            <button type="submit" class="btn btn-primary btn-block">Crear cuenta</button>
        </form>
        <p class="auth-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
</div>
{% endblock %}
